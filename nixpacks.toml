# Config para deploy con Nixpacks (EasyPanel / Railway).
# Nota: al usar Supabase ya NO se necesita python3/gcc/gnumake
# (eran para compilar better-sqlite3).
providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start:all"
